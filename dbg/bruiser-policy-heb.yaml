version: 1
filesystem_policy:
  include_workdir: false
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  - /sandbox
  - /sandbox/.openclaw
  read_write:
  - /tmp
  - /dev/null
  - /sandbox/.openclaw-data
  - /sandbox/.nemoclaw
  - /sandbox
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  brave:
    name: brave
    endpoints:
    - host: api.search.brave.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/node
    - path: /usr/bin/node
  claude_code:
    name: claude_code
    endpoints:
    - host: api.anthropic.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: POST
          path: /v1/messages
      - allow:
          method: POST
          path: /v1/messages/batches
      - allow:
          method: GET
          path: /v1/messages/batches/**
      - allow:
          method: POST
          path: /v1/complete
    - host: statsig.anthropic.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: POST
          path: /**
    - host: sentry.io
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/claude
  clawhub:
    name: clawhub
    endpoints:
    - host: clawhub.ai
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
  discord:
    name: discord
    endpoints:
    - host: discord.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
      - allow:
          method: PUT
          path: /**
      - allow:
          method: PATCH
          path: /**
      - allow:
          method: DELETE
          path: /api/v*/channels/*/messages/*
      - allow:
          method: DELETE
          path: /api/v*/channels/*/messages/*/reactions/*/*
    - host: gateway.discord.gg
      port: 443
      access: full
    - host: cdn.discordapp.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    - host: media.discordapp.net
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/node
    - path: /usr/bin/node
  npm_registry:
    name: npm_registry
    endpoints:
    - host: registry.npmjs.org
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/npm
    - path: /usr/local/bin/node
  npm_yarn:
    name: npm_yarn
    endpoints:
    - host: registry.npmjs.org
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    - host: registry.yarnpkg.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/npm*
    - path: /usr/local/bin/npx*
    - path: /usr/local/bin/node*
    - path: /usr/local/bin/yarn*
    - path: /usr/bin/npm*
    - path: /usr/bin/node*
  nvidia:
    name: nvidia
    endpoints:
    - host: integrate.api.nvidia.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: POST
          path: /v1/chat/completions
      - allow:
          method: POST
          path: /v1/completions
      - allow:
          method: POST
          path: /v1/embeddings
      - allow:
          method: GET
          path: /v1/models
      - allow:
          method: GET
          path: /v1/models/**
    - host: inference-api.nvidia.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: POST
          path: /v1/chat/completions
      - allow:
          method: POST
          path: /v1/completions
      - allow:
          method: POST
          path: /v1/embeddings
      - allow:
          method: GET
          path: /v1/models
      - allow:
          method: GET
          path: /v1/models/**
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/local/bin/openclaw
  openclaw_api:
    name: openclaw_api
    endpoints:
    - host: openclaw.ai
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
  openclaw_docs:
    name: openclaw_docs
    endpoints:
    - host: docs.openclaw.ai
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
  pypi:
    name: pypi
    endpoints:
    - host: pypi.org
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: HEAD
          path: /**
    - host: files.pythonhosted.org
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: HEAD
          path: /**
    binaries:
    - path: /usr/bin/python3*
    - path: /usr/bin/pip*
    - path: /usr/local/bin/python3*
    - path: /usr/local/bin/pip*
    - path: /sandbox/.venv/bin/python*
    - path: /sandbox/.venv/bin/pip*
    - path: /sandbox/.uv/python/**/python*
    - path: /sandbox/.local/bin/pip*
  heb:
    name: heb
    endpoints:
    - host: host.docker.internal
      port: 4321
      access: full
      allowed_ips:
      - 192.168.65.254
    binaries:
    - path: /usr/local/bin/node
    - path: /usr/bin/node
    - path: /usr/local/bin/mcporter
