services:
  nemoclaw:
    build: .
    container_name: nemoclaw_agent

    # Run the port forward as the main process (foreground) so Docker keeps it
    # alive. Binds on the internal port 19789 (not 18789) so the socat proxy
    # service can own 18789 as a properly-mapped Docker bridge port.
    command: >
      openshell forward start 0.0.0.0:19789 ${NEMOCLAW_SANDBOX:-bruiser}

    restart: unless-stopped

    environment:
      # Name of the sandbox created during onboarding — used to auto-connect
      # the port 18789 forward on startup. Change if you named yours differently.
      - NEMOCLAW_SANDBOX=bruiser

      # Prevent Node from preferring broken IPv6 routes in WSL/Docker
      - NODE_OPTIONS=--dns-result-order=ipv4first
    volumes:
      # Persist NemoClaw sandbox config/state between container runs
      - ./nemoclaw-data:/root/.nemoclaw
      # Persist OpenShell gateway metadata between container runs
      - ./openshell-data:/root/.config/openshell
      # Docker socket so nemoclaw can reach the host daemon
      - /var/run/docker.sock:/var/run/docker.sock
    # host networking is required: the openshell gateway config hardcodes
    # 127.0.0.1:8080 as the cluster endpoint, set during onboard.
    network_mode: "host"

  # Docker Desktop WSL2 does not bridge host-networked container ports to
  # WSL2's localhost. This sidecar uses a proper bridge port mapping so that
  # http://localhost:18789 works from the browser/WSL2 shell. It proxies
  # to the nemoclaw container via the Docker bridge gateway (host-gateway).
  nemoclaw-ui:
    image: alpine/socat:latest
    container_name: nemoclaw_ui_proxy
    # host-gateway resolves to IPv6 on Docker Desktop; resolve IPv4 gateway
    # dynamically from the routing table instead.
    entrypoint: sh -c
    command: >
      "exec socat TCP-LISTEN:18789,fork,reuseaddr
      TCP:$$(ip route | awk '/^default/{print $$3; exit}'):19789"
    ports:
      - "18789:18789"
    depends_on:
      - nemoclaw
    restart: unless-stopped
